<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Kasir & Arus Kas Modern</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/lucide@latest"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
    body { 
      font-family: 'Inter', sans-serif; 
      background-color: #f8fafc;
      -webkit-tap-highlight-color: transparent;
    }
    .nav-active { color: #2563eb !important; }
    .nav-active i { transform: translateY(-2px); transition: transform 0.2s; }
    .page-transition { animation: fadeIn 0.3s ease-out; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    .pb-safe { padding-bottom: calc(env(safe-area-inset-bottom) + 5.5rem); }
    input, select, textarea { font-size: 16px !important; }
    .accounting { text-align: right; font-family: monospace; }
    
    #loading-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(255,255,255,0.8);
      z-index: 9999;
      backdrop-filter: blur(2px);
      align-items: center;
      justify-content: center;
      flex-direction: column;
    }
    .spinner {
      width: 40px;
      height: 40px;
      border: 4px solid #f3f3f3;
      border-top: 4px solid #2563eb;
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }
    @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

    /* Modal Styles */
    .modal-backdrop {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.5);
      z-index: 1000;
      align-items: end;
      justify-content: center;
    }
    .modal-content {
      background: white;
      width: 100%;
      max-width: 28rem;
      border-radius: 24px 24px 0 0;
      max-height: 85vh;
      overflow-y: auto;
      animation: slideUp 0.3s ease-out;
      display: flex;
      flex-direction: column;
    }
    @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
  </style>
</head>
<body class="pb-safe">

  <div id="loading-overlay">
    <div class="spinner mb-2"></div>
    <p class="text-xs font-bold text-slate-500 uppercase tracking-widest">Memproses...</p>
  </div>

  <!-- Modal Pemilih Barang -->
  <div id="product-modal" class="modal-backdrop" onclick="closeProductModal(event)">
    <div class="modal-content p-5 shadow-2xl" onclick="event.stopPropagation()">
      <div class="flex justify-between items-center mb-4">
        <h3 class="text-lg font-bold">Pilih Barang (Sheet Stok)</h3>
        <button onclick="closeProductModal()" class="p-2 bg-slate-100 rounded-full">
          <i data-lucide="x" class="w-5 h-5"></i>
        </button>
      </div>
      <div class="relative mb-4">
        <i data-lucide="search" class="absolute left-3 top-3.5 w-4 h-4 text-slate-400"></i>
        <input type="text" id="modal-search" placeholder="Cari di stok atau ketik nama baru..." 
               class="w-full p-3 pl-10 bg-slate-50 border border-slate-200 rounded-xl outline-none focus:ring-2 focus:ring-blue-500 font-medium"
               oninput="this.value = this.value.toUpperCase(); filterProducts()">
      </div>
      <div id="product-list" class="space-y-2 overflow-y-auto pr-1 mb-4 flex-1 min-h-[200px]">
        <!-- List barang dari sheet akan muncul di sini -->
      </div>
      <button id="btn-manual-add" onclick="selectManual()" class="w-full p-4 bg-blue-600 text-white rounded-xl font-bold shadow-lg hidden">
        Gunakan "<span id="manual-text"></span>" Sebagai Barang Baru
      </button>
    </div>
  </div>

<div id="general-modal" class="modal-backdrop" onclick="closeModal(event)">
    <div class="modal-content p-6 shadow-2xl" onclick="event.stopPropagation()">
      <div id="modalContent">
        </div>
    </div>
  </div>
  

  <header class="bg-white border-b sticky top-0 z-50 p-4 shadow-sm">
    <div class="max-w-md mx-auto flex justify-between items-center">
      <div>
        <p class="text-[10px] uppercase font-bold text-slate-400 tracking-wider">Total Saldo Kas</p>
        <h1 id="total-balance" class="text-xl font-bold text-slate-800">Rp 0</h1>
      </div>
      <div class="flex gap-2">
        <button class="bg-slate-50 p-2 rounded-lg active:scale-95 transition-transform" onclick="fetchMasterStock()">
          <i data-lucide="package-search" class="text-slate-600 w-5 h-5"></i>
        </button>
        <button class="bg-blue-50 p-2 rounded-lg active:scale-95 transition-transform" onclick="refreshData()">
          <i data-lucide="refresh-cw" class="text-blue-600 w-5 h-5"></i>
        </button>
      </div>
    </div>
  </header>

  <main id="main-content" class="max-w-md mx-auto p-4 page-transition">
    <div id="menu-container" class="space-y-4"></div>
  </main>

  <nav class="fixed bottom-0 left-0 right-0 bg-white border-t border-slate-200 px-2 py-1 z-[100] flex justify-around items-center shadow-[0_-8px_20px_rgba(0,0,0,0.03)]">
    <button onclick="changeTab('penjualan')" id="nav-penjualan" class="flex flex-col items-center gap-1 py-2 px-3 text-slate-400 nav-active">
      <i data-lucide="shopping-bag" class="w-5 h-5"></i>
      <span class="text-[10px] font-bold uppercase tracking-tighter">Jual</span>
    </button>
    <button onclick="changeTab('pembelian')" id="nav-pembelian" class="flex flex-col items-center gap-1 py-2 px-3 text-slate-400">
      <i data-lucide="truck" class="w-5 h-5"></i>
      <span class="text-[10px] font-bold uppercase tracking-tighter">Beli</span>
    </button>
    <button onclick="changeTab('operasional')" id="nav-operasional" class="flex flex-col items-center gap-1 py-2 px-3 text-slate-400">
      <i data-lucide="calculator" class="w-5 h-5"></i>
      <span class="text-[10px] font-bold uppercase tracking-tighter">Biaya</span>
    </button>
    <button onclick="changeTab('riwayat')" id="nav-riwayat" class="flex flex-col items-center gap-1 py-2 px-3 text-slate-400">
      <i data-lucide="history" class="w-5 h-5"></i>
      <span class="text-[10px] font-bold uppercase tracking-tighter">Riwayat</span>
    </button>
    <button onclick="changeTab('lainnya')" id="nav-lainnya" class="flex flex-col items-center gap-1 py-2 px-3 text-slate-400">
      <i data-lucide="grid" class="w-5 h-5"></i>
      <span class="text-[10px] font-bold uppercase tracking-tighter">Lainnya</span>
    </button>
  </nav>

  <script>
    const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbx-v5em17c8x81pp6IrIVitKkbi42yNPtjul1BP9OO_cjtb-qmX_jNk--zmpfSQz_LAOg/exec";

    let productMaster = [];
    let currentTargetInputId = null;
    let activeTab = 'penjualan';

    lucide.createIcons();

    function showLoading(show) {
      document.getElementById('loading-overlay').style.display = show ? 'flex' : 'none';
    }

    async function fetchMasterStock() {
      try {
        const response = await fetch(`${WEB_APP_URL}?action=getStockNames&_=${Date.now()}`);
        const data = await response.json();
        productMaster = data.map(name => ({ nama: name.toUpperCase(), harga: 0 })); 
      } catch (e) {
        console.error("Gagal ambil master stok:", e);
      }
    }

    function changeTab(tab) {
      activeTab = tab;
      const menuContainer = document.getElementById('menu-container');
      document.querySelectorAll('nav button').forEach(btn => btn.classList.remove('nav-active'));
      const activeBtn = document.getElementById('nav-' + tab);
      if(activeBtn) activeBtn.classList.add('nav-active');

      if (tab === 'penjualan') {
        menuContainer.innerHTML = `
          <div class="bg-white p-6 rounded-3xl border border-slate-100 shadow-sm space-y-4">
            <h2 class="text-xl font-bold flex items-center gap-2"><i data-lucide="shopping-cart" class="w-5 text-blue-600"></i> Penjualan Baru</h2>
            <div class="grid grid-cols-1 gap-2">
              <label class="text-[10px] font-bold text-gray-500 uppercase tracking-wider">Pelanggan</label>
              <input id="p_cust" type="text" placeholder="Nama Pelanggan" 
                     oninput="this.value = this.value.toUpperCase()"
                     class="w-full p-3 bg-slate-50 border-none rounded-xl focus:ring-2 focus:ring-blue-500 outline-none font-medium">
            </div>
            <div class="bg-slate-50 p-4 rounded-2xl border border-dashed border-slate-300">
              <p class="text-[10px] font-bold mb-3 text-slate-500 uppercase tracking-widest">Keranjang Barang</p>
              <div id="itemContainer" class="space-y-0"></div>
              <button onclick="addItem(true)" class="w-full mt-2 p-3 bg-white border border-blue-100 text-blue-600 rounded-xl font-bold text-xs flex items-center justify-center gap-2 shadow-sm active:scale-95 transition-transform">
                <i data-lucide="plus-circle" class="w-4 h-4"></i> TAMBAH BARANG
              </button>
            </div>
            <div class="grid grid-cols-2 gap-3">
              <div>
                <label class="text-[10px] font-bold text-gray-400 uppercase">Diskon (Rp)</label>
                <input id="p_disc" type="text" inputmode="numeric" oninput="maskNominal(this); calcTotal()" placeholder="0" class="w-full p-3 bg-slate-50 border-none rounded-xl accounting outline-none focus:ring-2 focus:ring-blue-500 font-bold">
              </div>
              <div>
                <label class="text-[10px] font-bold text-gray-400 uppercase">Metode</label>
                <select id="p_metode" class="w-full p-3 bg-slate-50 border-none rounded-xl bg-white font-bold text-slate-700 focus:ring-2 focus:ring-blue-500 outline-none appearance-none">
                  <option value="Cash">Cash</option>
                  <option value="Rekening">Rekening</option>
                </select>
              </div>
            </div>
            <div class="bg-blue-50 p-4 rounded-2xl border border-blue-100">
              <div class="flex justify-between items-center mb-1">
                <span class="text-xs font-medium text-blue-800">Total Tagihan:</span>
                <span id="p_total_raw" class="text-xs font-bold text-blue-800 tracking-wider">Rp 0</span>
              </div>
              <div class="flex justify-between items-center text-blue-900 border-t border-blue-200 mt-2 pt-2">
                <span class="text-sm font-bold">Total Akhir:</span>
                <span id="p_final" class="text-lg font-black tracking-tight">Rp 0</span>
              </div>
            </div>
            <div class="pt-1">
              <label class="text-[10px] font-bold text-gray-500 uppercase block mb-1">DP / Pembayaran Sekarang</label>
              <input id="p_dp" type="text" inputmode="numeric" oninput="maskNominal(this); calcTotal()" placeholder="Masukkan nominal bayar" class="w-full p-4 bg-green-50 border-2 border-green-200 rounded-2xl text-xl font-extrabold text-green-700 focus:ring-4 focus:ring-green-100 outline-none accounting">
              <p id="p_status_piutang" class="text-[10px] mt-1 text-slate-500 italic"></p>
            </div>
            <button onclick="savePenjualan()" class="w-full bg-blue-600 text-white p-4 rounded-2xl font-extrabold shadow-lg shadow-blue-100 active:scale-95 transition-transform flex items-center justify-center gap-2">
               <i data-lucide="check-circle" class="w-5"></i> PROSES TRANSAKSI
            </button>
          </div>
        `;
        addItem(false); 
      } 
      else if (tab === 'pembelian') {
        menuContainer.innerHTML = `
          <div class="bg-white p-6 rounded-3xl border border-slate-100 shadow-sm space-y-4">
            <h2 class="text-xl font-bold mb-4 flex items-center gap-2"><i data-lucide="truck" class="text-red-600"></i> Pembelian Barang</h2>
            <div class="space-y-4">
              <input id="b_supp" type="text" placeholder="Nama Supplier" 
                     oninput="this.value = this.value.toUpperCase()"
                     class="w-full p-3 bg-slate-50 border-none rounded-xl focus:ring-2 focus:ring-red-500 outline-none font-medium">
              
              <div class="bg-slate-50 p-4 rounded-2xl border border-dashed border-slate-300">
                <p class="text-[10px] font-bold mb-3 text-slate-500 uppercase tracking-widest">Daftar Belanja</p>
                <div id="itemContainer" class="space-y-0"></div>
                <button onclick="addItem(true)" class="w-full mt-2 p-3 bg-white border border-red-100 text-red-600 rounded-xl font-bold text-xs flex items-center justify-center gap-2 shadow-sm active:scale-95 transition-transform">
                  <i data-lucide="plus-circle" class="w-4 h-4"></i> TAMBAH BARANG
                </button>
              </div>

              <select id="b_metode" class="w-full p-3 bg-slate-50 border-none rounded-xl bg-white font-bold text-slate-700 focus:ring-2 focus:ring-red-500 outline-none appearance-none">
                <option value="Cash">Cash</option>
                <option value="Rekening">Rekening</option>
              </select>

              <div>
                <label class="block text-[10px] font-bold text-slate-400 uppercase ml-1 mb-1 tracking-wider">Bayar Sekarang (DP)</label>
                <input id="b_dp" type="text" inputmode="numeric" oninput="maskNominal(this); calcTotal()" placeholder="0" class="w-full p-4 bg-red-50 border-2 border-red-100 rounded-2xl text-xl font-extrabold text-red-600 focus:ring-4 focus:ring-red-100 outline-none accounting">
              </div>

              <div class="bg-red-50 p-4 rounded-2xl border border-red-100 flex justify-between items-center">
                <span class="font-bold text-red-800">Total Belanja:</span>
                <span id="b_final" class="text-xl font-black text-red-700 tracking-tight">Rp 0</span>
              </div>

              <button onclick="savePembelian()" class="w-full bg-red-600 text-white p-4 rounded-2xl font-extrabold shadow-lg shadow-red-100 active:scale-95 transition-transform flex items-center justify-center gap-2">
                 <i data-lucide="save" class="w-5"></i> SIMPAN PEMBELIAN
              </button>
            </div>
          </div>
        `;
        addItem(false);
      }
      else if (tab === 'operasional') {
        menuContainer.innerHTML = `
          <div class="bg-white p-6 rounded-3xl border border-slate-100 shadow-sm space-y-4">
            <h2 class="text-xl font-bold mb-4 flex items-center gap-2"><i data-lucide="calculator" class="text-orange-600"></i> Pengeluaran Biaya</h2>
            <div class="space-y-4">
              <div class="flex gap-2">
                <select id="op_metode" class="w-full p-3 bg-slate-50 border-none rounded-xl bg-white font-bold text-slate-700 focus:ring-2 focus:ring-orange-500 outline-none appearance-none">
                  <option value="Cash">Metode: Cash</option>
                  <option value="Rekening">Metode: Rekening</option>
                </select>
              </div>
              
              <div class="flex items-center gap-3 p-4 bg-red-50 border border-red-100 rounded-2xl">
                <input type="checkbox" id="is_refund" class="w-6 h-6 accent-red-600 cursor-pointer">
                <label for="is_refund" class="text-xs font-bold text-red-700 cursor-pointer">Ini adalah Dana Refund (Pengembalian)</label>
              </div>

              <div>
                <label class="block text-[10px] font-bold text-slate-400 uppercase ml-1 mb-1 tracking-wider">Nominal Pengeluaran</label>
                <input id="op_nom" type="text" inputmode="numeric" oninput="maskNominal(this)" placeholder="0" 
                       class="w-full p-4 bg-slate-50 border-none rounded-2xl text-xl font-extrabold text-slate-800 focus:ring-4 focus:ring-slate-100 outline-none accounting">
              </div>

              <div>
                <label class="block text-[10px] font-bold text-slate-400 uppercase ml-1 mb-1 tracking-wider">Keterangan</label>
                <textarea id="op_ket" placeholder="Tulis rincian pengeluaran di sini..." 
                          class="w-full p-4 bg-slate-50 border-none rounded-2xl h-32 focus:ring-4 focus:ring-slate-100 outline-none font-medium"></textarea>
              </div>

              <button onclick="saveOperasional()" class="w-full bg-slate-800 text-white p-4 rounded-2xl font-extrabold shadow-lg active:scale-95 transition-transform flex items-center justify-center gap-2">
                 <i data-lucide="send" class="w-5"></i> SIMPAN PENGELUARAN
              </button>
            </div>
          </div>
        `;
      }
        else if (tab === 'lainnya') {
        menuContainer.innerHTML = `
          <div class="bg-white p-5 rounded-3xl border border-slate-100 shadow-sm space-y-6">
            <h2 class="text-lg font-bold flex items-center gap-2 text-slate-700">
              <i data-lucide="grid" class="w-5"></i> Administrasi & Keuangan
            </h2>
            
            <div class="grid grid-cols-4 gap-2">
              <button onclick="showMenuAction('UTANG')" class="flex flex-col items-center p-3 bg-amber-50 border border-amber-100 rounded-2xl active:scale-95 transition-all gap-1">
                <div class="p-2 bg-amber-100 rounded-xl text-amber-600">
                  <i data-lucide="book-open" class="w-4 h-4"></i>
                </div>
                <span class="text-[9px] font-black text-amber-800 uppercase tracking-tighter text-center leading-tight">Utang</span>
              </button>

              <button onclick="showMenuAction('PIUTANG')" class="flex flex-col items-center p-3 bg-emerald-50 border border-emerald-100 rounded-2xl active:scale-95 transition-all gap-1">
                <div class="p-2 bg-emerald-100 rounded-xl text-emerald-600">
                  <i data-lucide="wallet" class="w-4 h-4"></i>
                </div>
                <span class="text-[9px] font-black text-emerald-800 uppercase tracking-tighter text-center leading-tight">Piutang</span>
              </button>

              <button onclick="showMenuAction('TRANSFER')" class="flex flex-col items-center p-3 bg-blue-50 border border-blue-100 rounded-2xl active:scale-95 transition-all gap-1">
                <div class="p-2 bg-blue-100 rounded-xl text-blue-600">
                  <i data-lucide="arrow-left-right" class="w-4 h-4"></i>
                </div>
                <span class="text-[9px] font-black text-blue-800 uppercase tracking-tighter text-center leading-tight">Tf Saldo</span>
              </button>

              <button onclick="showMenuAction('CANCEL')" class="flex flex-col items-center p-3 bg-rose-50 border border-rose-100 rounded-2xl active:scale-95 transition-all gap-1">
                <div class="p-2 bg-rose-100 rounded-xl text-rose-600">
                  <i data-lucide="x-circle" class="w-4 h-4"></i>
                </div>
                <span class="text-[9px] font-black text-rose-800 uppercase tracking-tighter text-center leading-tight">Batal</span>
              </button>
            </div>

            <div id="action-form-container" class="mt-4 hidden p-5 bg-slate-50 rounded-2xl border border-slate-200 animate-in fade-in slide-in-from-top-2 duration-300">
              </div>

            <div class="pt-4 border-t border-slate-100">
               <button onclick="location.reload()" class="w-full p-4 bg-slate-100 text-slate-600 rounded-2xl font-bold text-xs uppercase tracking-widest flex items-center justify-center gap-2">
                 <i data-lucide="refresh-cw" class="w-4 h-4"></i> Muat Ulang Aplikasi
               </button>
            </div>
          </div>
        `;
      }
      else {
        menuContainer.innerHTML = `<div class="p-10 text-center text-slate-400">Halaman sedang disiapkan.</div>`;
      }
      lucide.createIcons();
    }

    function addItem(autoOpen = true) {
      const id = Date.now();
      const div = document.createElement('div');
      div.id = `item-${id}`;
      div.className = "bg-white p-3 rounded-xl border border-slate-200 mb-3 shadow-sm animate-in slide-in-from-left duration-300";
      div.innerHTML = `
        <div class="flex gap-2 mb-2">
          <div class="relative flex-1">
            <input type="text" id="input-${id}" placeholder="Pilih barang stok..." readonly
                   onclick="openProductModal('input-${id}')"
                   class="w-full p-2.5 border rounded-lg text-sm font-semibold outline-none focus:ring-2 focus:ring-blue-100 bg-slate-50 item-name cursor-pointer">
          </div>
          <button onclick="document.getElementById('item-${id}').remove(); calcTotal()" 
                  class="w-10 h-10 shrink-0 bg-red-50 text-red-500 border border-red-100 hover:bg-red-100 rounded-lg flex items-center justify-center transition-colors">
            <i data-lucide="trash-2" class="w-4 h-4"></i>
          </button>
        </div>
        <div class="flex gap-2 items-center">
          <div class="w-16 shrink-0">
            <input type="number" placeholder="Qty" oninput="calcTotal()" value="1"
                   class="w-full p-2 border rounded-lg text-sm font-bold text-center h-10 outline-none focus:ring-2 focus:ring-blue-100 qty-input">
          </div>
          <div class="flex-1 min-w-0">
            <input type="text" inputmode="numeric" placeholder="Harga" 
                   oninput="maskNominal(this); calcTotal()" 
                   class="w-full p-2 border rounded-lg text-lg font-bold accounting h-10 text-right outline-none focus:ring-2 focus:ring-blue-100 item-price">
          </div>
        </div>
      `;
      document.getElementById('itemContainer').appendChild(div);
      lucide.createIcons();

      if (autoOpen) {
        openProductModal(`input-${id}`);
      }
    }

    async function openProductModal(inputId) {
      currentTargetInputId = inputId;
      document.getElementById('product-modal').style.display = 'flex';
      if (productMaster.length === 0) {
        showLoading(true);
        await fetchMasterStock();
        showLoading(false);
      }
      document.getElementById('modal-search').value = '';
      document.getElementById('modal-search').focus();
      filterProducts();
    }

    function closeProductModal(e) {
      if (!e || e.target.id === 'product-modal') {
        document.getElementById('product-modal').style.display = 'none';
      }
    }

    function filterProducts() {
      const query = document.getElementById('modal-search').value.toUpperCase().trim();
      const list = document.getElementById('product-list');
      const btnManual = document.getElementById('btn-manual-add');
      const manualText = document.getElementById('manual-text');
      list.innerHTML = '';
      const filtered = productMaster.filter(p => p.nama.toUpperCase().includes(query));
      if (filtered.length > 0) {
        filtered.forEach(p => {
          const div = document.createElement('div');
          div.className = "p-4 bg-slate-50 border border-slate-100 rounded-xl flex justify-between items-center active:bg-blue-50 transition-colors cursor-pointer hover:border-blue-200";
          div.onclick = () => selectProduct(p.nama.toUpperCase(), p.harga);
          div.innerHTML = `
            <div class="flex items-center gap-3">
               <div class="bg-blue-100 p-2 rounded-lg"><i data-lucide="package" class="w-4 h-4 text-blue-600"></i></div>
               <span class="font-semibold text-slate-700 uppercase">${p.nama}</span>
            </div>
            <i data-lucide="chevron-right" class="w-4 h-4 text-slate-300"></i>
          `;
          list.appendChild(div);
        });
        btnManual.classList.add('hidden');
      } else {
        const empty = document.createElement('div');
        empty.className = "flex flex-col items-center justify-center p-10 text-center text-slate-400";
        empty.innerHTML = `<div class="bg-slate-100 p-4 rounded-full mb-3"><i data-lucide="search-x" class="w-8 h-8"></i></div><p class="text-sm">Barang tidak ada di database stok.</p>`;
        list.appendChild(empty);
        if (query.length > 0) {
          btnManual.classList.remove('hidden');
          manualText.innerText = query;
        } else {
          btnManual.classList.add('hidden');
        }
      }
      lucide.createIcons();
    }

    function selectProduct(nama, harga) {
      const input = document.getElementById(currentTargetInputId);
      const parent = input.closest('[id^="item-"]');
      const priceInput = parent.querySelector('.item-price');
      input.value = nama.toUpperCase();
      if (harga > 0) priceInput.value = harga.toLocaleString('id-ID');
      closeProductModal();
      calcTotal();
      parent.querySelector('.qty-input').focus();
    }

    function selectManual() {
      const query = document.getElementById('modal-search').value.toUpperCase();
      if (query) selectProduct(query, 0);
    }

    function maskNominal(el) {
      let val = el.value.replace(/\D/g, "");
      if (val === "") { el.value = ""; return; }
      el.value = Number(val).toLocaleString('id-ID');
    }

    function unmask(val) {
      if (!val) return 0;
      let clean = val.toString().replace("Rp ", "").replace(/\./g, "");
      return parseFloat(clean) || 0;
    }

    function calcTotal() {
      const items = document.querySelectorAll('[id^="item-"]');
      let subtotal = 0;
      items.forEach(item => {
        const qty = parseFloat(item.querySelector('.qty-input').value) || 0;
        const price = unmask(item.querySelector('.item-price').value);
        subtotal += (qty * price);
      });

      // Penjualan
      const elDisc = document.getElementById('p_disc');
      const elDpPenjualan = document.getElementById('p_dp');
      const elTotalRaw = document.getElementById('p_total_raw');
      const elFinalPenjualan = document.getElementById('p_final');
      if (elFinalPenjualan) {
        const disc = elDisc ? unmask(elDisc.value) : 0;
        const dp = elDpPenjualan ? unmask(elDpPenjualan.value) : 0;
        const final = subtotal - disc;
        const sisa = final - dp;
        if (elTotalRaw) elTotalRaw.innerText = "Rp " + new Intl.NumberFormat('id-ID').format(subtotal);
        elFinalPenjualan.innerText = "Rp " + new Intl.NumberFormat('id-ID').format(final);
        const statusPiutang = document.getElementById('p_status_piutang');
        if (statusPiutang) {
            if (sisa > 0) {
              statusPiutang.innerText = "Sisa Piutang: Rp " + new Intl.NumberFormat('id-ID').format(sisa);
              statusPiutang.className = "text-[10px] mt-1 text-red-500 font-bold italic";
            } else if (sisa < 0) {
              statusPiutang.innerText = "Kembalian: Rp " + new Intl.NumberFormat('id-ID').format(Math.abs(sisa));
              statusPiutang.className = "text-[10px] mt-1 text-blue-600 font-bold italic";
            } else {
              statusPiutang.innerText = "Lunas";
              statusPiutang.className = "text-[10px] mt-1 text-green-600 font-bold italic";
            }
        }
      }

      // Pembelian
      const elFinalPembelian = document.getElementById('b_final');
      if (elFinalPembelian) elFinalPembelian.innerText = "Rp " + new Intl.NumberFormat('id-ID').format(subtotal);
    }

    function collectItems() {
      const itemsData = [];
      document.querySelectorAll('[id^="item-"]').forEach(el => {
        const inputNama = el.querySelector('.item-name');
        if (!inputNama) return;
        const nama = inputNama.value.toUpperCase();
        const harga = unmask(el.querySelector('.item-price').value);
        if (nama && nama !== "PILIH BARANG STOK...") {
          itemsData.push({
            nama: nama,
            qty: parseFloat(el.querySelector('.qty-input').value) || 1,
            harga: harga
          });
        }
      });
      return itemsData;
    }

    async function runScript(actionName, payload, stayInTab) {
      const btn = document.querySelector('button[onclick*="save"]');
      if (btn) btn.disabled = true;
      showLoading(true);

      try {
        await fetch(WEB_APP_URL, {
          method: "POST",
          mode: "no-cors",
          cache: "no-cache",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(payload),
        });

        setTimeout(() => {
          refreshData(); 
          fetchMasterStock();
          alert("Transaksi Berhasil Diproses!");
          changeTab(stayInTab);
          showLoading(false);
        }, 1200);

      } catch (err) {
        showLoading(false);
        alert("Koneksi bermasalah. Data gagal terkirim!");
      } finally {
        if (btn) btn.disabled = false;
      }
    }

    function savePenjualan() {
      const items = collectItems();
      if(items.length === 0) return alert("Pilih barang terlebih dahulu!");
      const payload = {
        action: 'processTransaction',
        type: 'PENJUALAN',
        pelanggan: (document.getElementById('p_cust').value || 'UMUM').toUpperCase(),
        items: items,
        diskon: unmask(document.getElementById('p_disc').value),
        dp: unmask(document.getElementById('p_dp').value),
        metode: document.getElementById('p_metode').value
      };
      payload.total = items.reduce((a, b) => a + (b.qty * b.harga), 0);
      runScript('processTransaction', payload, 'penjualan');
    }

    function savePembelian() {
      const items = collectItems();
      if(items.length === 0) return alert("Daftar belanja kosong!");
      const total = items.reduce((a, b) => a + (b.qty * b.harga), 0);
      const payload = {
        action: 'processTransaction',
        type: 'PEMBELIAN',
        supplier: (document.getElementById('b_supp').value || '-').toUpperCase(),
        items: items,
        total: total,
        dp: unmask(document.getElementById('b_dp').value),
        metode: document.getElementById('b_metode').value
      };
      runScript('processTransaction', payload, 'pembelian');
    }

    async function saveOperasional() {
      const elNom = document.getElementById('op_nom');
      const elKet = document.getElementById('op_ket');
      const nominal = unmask(elNom?.value);
      const keterangan = elKet?.value.trim();
      const isRefund = document.getElementById('is_refund')?.checked;

      if (nominal <= 0 || !keterangan) return alert("Nominal dan keterangan wajib diisi.");
      
      const payload = {
        action: "saveOperasional", 
        type: isRefund ? "PENGEMBALIAN_DANA" : "OPERASIONAL",
        nominal: nominal,
        keterangan: isRefund ? "[REFUND] " + keterangan : keterangan,
        metode: document.getElementById('op_metode').value
      };
      runScript('saveOperasional', payload, 'operasional');
    }

    function showMenuAction(type) {
      const container = document.getElementById('action-form-container');
      container.classList.remove('hidden');
      
      if (type === 'UTANG') {
        fetchUtangList();
        } else if (type === 'PIUTANG') {
    fetchPiutangList(); // Tambahkan baris ini
      } else {
        container.innerHTML = `<div class="p-10 text-center text-slate-400 font-bold uppercase tracking-widest text-xs">Fitur ${type} Segera Hadir</div>`;
      }
      lucide.createIcons();
    }

    // --- UTILITY FUNCTIONS ---
    function formatRupiah(angka) {
      return "Rp " + new Intl.NumberFormat('id-ID').format(angka);
    }

    function openModal() {
      document.getElementById('general-modal').style.display = 'flex';
    }

    function closeModal(e) {
      if (!e || e.target.id === 'general-modal' || e.target.closest('button')) {
        document.getElementById('general-modal').style.display = 'none';
      }
    }

    // --- LOGIKA UTANG ---
    async function bayarUtang(idUtang, sisaLama, namaSupplier) {
      openModal();
      const content = document.getElementById('modalContent');
      content.innerHTML = `<div class="p-10 text-center"><div class="spinner mx-auto mb-4"></div><p class="text-slate-500">Mengambil rincian...</p></div>`;

      try {
        const response = await fetch(`${WEB_APP_URL}?action=getDetail&id=${encodeURIComponent(idUtang)}`);
        const detailRaw = await response.json();
        let items = typeof detailRaw === 'string' ? JSON.parse(detailRaw) : detailRaw;

        let itemsHtml = `<div class="mt-3 text-center py-4 border-t border-dotted"><p class="text-xs text-slate-400">Rincian tidak tersedia</p></div>`;
        if (Array.isArray(items) && items.length > 0) {
          itemsHtml = `
            <div class="mt-3 pt-3 border-t border-slate-200">
              <p class="text-[10px] font-bold text-slate-400 uppercase mb-2">Rincian Barang:</p>
              <div class="max-h-32 overflow-y-auto space-y-1.5">
                ${items.map(it => `
                  <div class="flex justify-between text-xs items-center">
                    <span class="text-slate-600 truncate mr-2">${it.nama} <span class="text-[10px] text-slate-300">x${it.qty}</span></span>
                    <span class="font-bold text-slate-700">${formatRupiah(it.harga * it.qty)}</span>
                  </div>
                `).join('')}
              </div>
            </div>`;
        }

        content.innerHTML = `
          <div class="p-2">
            <h2 class="text-xl font-bold text-red-600 mb-2 flex items-center gap-2"><i data-lucide="shield-check"></i> Pelunasan Utang</h2>
            <div class="bg-white border-2 border-red-100 rounded-2xl p-4 mb-4">
              <div class="flex justify-between items-start border-b pb-2 mb-2">
                <div><p class="text-[10px] font-bold text-slate-400">SUPPLIER</p><h3 class="font-bold text-slate-800">${namaSupplier}</h3></div>
                <p class="text-[10px] font-mono bg-slate-100 px-2 py-0.5 rounded">${idUtang}</p>
              </div>
              ${itemsHtml}
              <div class="mt-4 bg-red-50 p-3 rounded-xl flex justify-between items-center">
                <span class="text-sm font-bold text-red-800">Total Lunas:</span>
                <span class="text-xl font-black text-red-600">${formatRupiah(sisaLama)}</span>
              </div>
            </div>
            <div class="space-y-3">
              <select id="pay_utang_metode" class="w-full p-3.5 border-2 border-slate-100 rounded-xl font-bold bg-slate-50 outline-none">
                <option value="Cash">Cash (Tunai)</option><option value="Rekening">Rekening (Transfer)</option>
              </select>
              <div class="flex gap-2">
                <button onclick="closeModal()" class="flex-1 py-3.5 bg-slate-100 text-slate-600 font-bold rounded-xl">Batal</button>
                <button onclick="eksekusiPelunasanUtang('${idUtang}', ${sisaLama})" class="flex-[2] py-3.5 bg-red-600 text-white font-bold rounded-xl shadow-lg">Bayar Lunas</button>
              </div>
            </div>
          </div>
        `;
        lucide.createIcons();
      } catch (e) {
        content.innerHTML = `<div class="p-6 text-center text-red-500">Error: ${e.message}</div>`;
      }
    }

    async function eksekusiPelunasanUtang(id, nominal) {
      const payload = {
        action: 'processTransaction',
        type: 'BAYAR_UTANG',
        idUtang: id,
        nominal: nominal,
        metode: document.getElementById('pay_utang_metode').value
      };
      closeModal();
      showLoading(true);
      try {
        // Menggunakan mode 'no-cors' jika Apps Script tidak memberikan response JSON balik, 
        // namun untuk sinkronisasi data lebih baik tanpa no-cors jika memungkinkan.
        await fetch(WEB_APP_URL, { 
          method: "POST", 
          mode: "no-cors",
          body: JSON.stringify(payload) 
        });
        
        setTimeout(() => {
          refreshData();
          fetchUtangList();
          showLoading(false);
          alert("Pembayaran utang berhasil dicatat!");
        }, 1500);
      } catch (e) {
        showLoading(false);
        alert("Gagal memproses pembayaran.");
      }
    }

    async function fetchUtangList() {
      const container = document.getElementById('action-form-container');
      container.innerHTML = `<div class="p-4 text-center text-slate-400">Memuat data utang...</div>`;
      try {
        const res = await fetch(`${WEB_APP_URL}?action=getActivePayables&_=${Date.now()}`);
        const rawData = await res.json();
        
        const data = rawData.filter(u => (parseFloat(u.Sisa_Utang) || 0) > 0);
        
        if (data.length === 0) {
          container.innerHTML = `<div class="p-6 text-center bg-emerald-50 rounded-2xl border border-emerald-100">
            <i data-lucide="check-circle" class="w-8 h-8 text-emerald-500 mx-auto mb-2"></i>
            <p class="text-sm font-bold text-emerald-800">Semua utang sudah lunas!</p>
          </div>`;
        } else {
          container.innerHTML = `
            <h3 class="text-[10px] font-black text-slate-400 uppercase tracking-widest mb-2 px-1">Daftar Utang Aktif</h3>
            <div class="space-y-2">
              ${data.map(u => `
                <div onclick="bayarUtang('${u.ID_Pembelian}', ${u.Sisa_Utang}, '${u.Supplier}')" class="p-4 bg-white border border-slate-200 rounded-2xl flex justify-between items-center active:scale-95 cursor-pointer hover:border-red-200 transition-colors">
                  <div>
                    <p class="font-black text-slate-800 leading-tight">${u.Supplier}</p>
                    <p class="text-[9px] text-slate-400 font-mono">${u.ID_Pembelian}</p>
                  </div>
                  <div class="text-right">
                    <p class="text-sm font-black text-red-600">${formatRupiah(u.Sisa_Utang)}</p>
                    <p class="text-[8px] font-bold text-slate-300 uppercase">Klik Bayar</p>
                  </div>
                </div>
              `).join('')}
            </div>
          `;
        }
        lucide.createIcons();
      } catch (e) {
        container.innerHTML = `<p class="text-red-500 p-4">Gagal memuat data dari server.</p>`;
      }
    }

    // --- LOGIKA PIUTANG ---
async function fetchPiutangList() {
  const container = document.getElementById('action-form-container');
  container.innerHTML = `<div class="p-4 text-center text-slate-400"><div class="spinner mx-auto w-6 h-6 mb-2"></div>Memindai database piutang...</div>`;
  
  try {
    const response = await fetch(`${WEB_APP_URL}?action=getActiveReceivables&_=${Date.now()}`);
    const list = await response.json();
    
    const dataList = Array.isArray(list) ? list : [];
    const activePiutang = dataList.filter(p => (parseFloat(p.sisa) || 0) > 0);
    
    if (activePiutang.length === 0) {
      container.innerHTML = `<div class="p-6 text-center bg-emerald-50 rounded-2xl border border-emerald-100"><i data-lucide="check-circle" class="w-8 h-8 text-emerald-500 mx-auto mb-2"></i><p class="text-sm font-bold text-emerald-800">Semua piutang sudah lunas!</p></div>`;
    } else {
      container.innerHTML = `
        <h3 class="text-[10px] font-black text-slate-400 uppercase tracking-widest mb-2 px-1">Daftar Piutang Aktif</h3>
        <div class="space-y-2">
          ${activePiutang.map(p => `
            <div onclick="bayarPiutang('${p.id}', ${p.sisa}, '${p.nama}')" class="p-4 bg-white border border-slate-200 rounded-2xl flex justify-between items-center active:scale-95 cursor-pointer hover:border-purple-200 transition-colors">
              <div><p class="font-black text-slate-800 leading-tight">${p.nama || 'Tanpa Nama'}</p><p class="text-[9px] text-slate-400 font-mono">${p.id}</p></div>
              <div class="text-right"><p class="text-sm font-black text-purple-600">${formatRupiah(p.sisa)}</p><p class="text-[8px] font-bold text-slate-300 uppercase tracking-tight">Bayar Lunas</p></div>
            </div>
          `).join('')}
        </div>`;
    }
  } catch (err) {
    container.innerHTML = `<div class="p-10 text-center text-red-500 font-bold text-xs uppercase tracking-widest">Gagal terhubung ke server.</div>`;
  }
  lucide.createIcons();
}

function bayarPiutang(id, sisa, nama) {
  openModal();
  const content = document.getElementById('modalContent');
  content.innerHTML = `
    <h2 class="text-xl font-bold mb-4 flex items-center gap-2 text-purple-600"><i data-lucide="hand-coins"></i> Pelunasan Piutang</h2>
    <div class="space-y-4">
      <div class="bg-purple-50 p-4 rounded-xl">
        <p class="text-[10px] font-bold text-purple-400 uppercase">PELANGGAN</p>
        <h3 class="font-black text-slate-800">${nama}</h3>
        <div class="flex justify-between mt-2 pt-2 border-t border-purple-100">
            <span class="text-xs font-bold text-slate-500">Sisa Piutang:</span>
            <span class="text-sm font-black text-purple-700">${formatRupiah(sisa)}</span>
        </div>
      </div>
      <div class="space-y-3">
        <div>
          <label class="text-[10px] font-black text-slate-400 uppercase tracking-widest ml-1">Metode Penerimaan</label>
          <select id="pi_metode" class="w-full p-3.5 border-2 border-slate-100 rounded-xl bg-slate-50 font-bold outline-none">
            <option value="Cash">Cash (Tunai)</option><option value="Rekening">Rekening (Transfer)</option>
          </select>
        </div>
        <div class="flex gap-2 pt-2">
          <button onclick="closeModal()" class="flex-1 py-4 bg-slate-100 text-slate-600 font-bold rounded-2xl">Batal</button>
          <button onclick="saveBayarPiutang('${id}', ${sisa})" class="flex-[2] py-4 bg-purple-600 text-white font-bold rounded-2xl shadow-lg active:scale-95 transition">Bayar Lunas Sekarang</button>
        </div>
      </div>
    </div>`;
  lucide.createIcons();
}

async function saveBayarPiutang(id, sisa) {
  const payload = { 
    action: 'processTransaction', 
    type: 'BAYAR_PIUTANG', 
    idPiutang: id, 
    nominal: sisa, 
    metode: document.getElementById('pi_metode').value 
  };
  closeModal(); 
  showLoading(true);
  try { 
    await fetch(WEB_APP_URL, { 
      method: "POST", 
      mode: "no-cors", // Gunakan mode no-cors jika backend tidak mendukung CORS
      body: JSON.stringify(payload) 
    }); 
    
    // Berikan jeda sebentar untuk proses di server
    setTimeout(() => {
      refreshData(); 
      fetchPiutangList(); 
      showLoading(false);
      alert("Pelunasan piutang berhasil disimpan!");
    }, 1500);
  } 
  catch(e) { 
    showLoading(false);
    alert("Gagal memproses piutang."); 
  } 
}

    async function refreshData() {
      try {
        const response = await fetch(`${WEB_APP_URL}?action=getBalances&_=${Date.now()}`);
        const data = await response.json();
        if (data) {
          const total = (data.cash || 0) + (data.bank || 0);
          document.getElementById('total-balance').innerText = "Rp " + total.toLocaleString('id-ID');
        }
      } catch (e) { console.error(e); }
    }

    window.onload = () => {
      refreshData();
      fetchMasterStock();
      changeTab('penjualan');
    };
  </script>
